# ============================================================
# Netlify Configuration — ProStrike Football Academy
# This file configures deployment and security headers
# ============================================================

[build]
  publish = "."          # Root directory (static site)
  # command = ""         # No build step needed for static HTML

# ============ SECURITY HEADERS ============
# These protect your site from common attacks

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    
    # Enable XSS filter
    X-XSS-Protection = "1; mode=block"
    
    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Restrict browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    
    # Force HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Content Security Policy (adjust as needed)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://www.gstatic.com https://apis.google.com https://www.googleapis.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://*.firebaseapp.com https://securetoken.googleapis.com; frame-src https://accounts.google.com https://www.google.com https://indra-football-academy.firebaseapp.com https://*.firebaseapp.com;"

# ============ REDIRECTS ============
# Custom 404 page
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# ============ CACHE CONTROL ============
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
